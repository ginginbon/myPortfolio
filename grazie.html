<!DOCTYPE html>

  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: #f5f5f5; font-family: 'DM Sans', system-ui, sans-serif; }

    .grazie-wrap {
      min-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 2rem;
    }

    .grazie-label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #db2b56;
      margin-bottom: 1rem;
    }

    .grazie-title {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      color: var(--dark);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
    }

    .grazie-sub {
      font-size: 1rem;
      color: #888;
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 2.5rem;
    }

    .btn-back {
      display: inline-block;
      background: #db2b56;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.2s;
      font-family: inherit;
    }

    .btn-back:hover { background: #b02040; }
