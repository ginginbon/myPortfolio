<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contatti — Ginevra Boneschi</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: #f5f5f5; font-family: 'DM Sans', system-ui, sans-serif; }

    .contatti-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
    }

    /* ── SINISTRA: MAPPA ── */
    .map-section h2 {
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      color: var(--dark);
      margin-bottom: 0.5rem;
    }

    .map-section .map-sub {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .map-container {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
    }

    .map-img {
      width: 100%;
      display: block;
      border-radius: 12px;
      filter: url(#duotone);
    }

    /* ── PIN ── */
    .pin {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 2;
    }

    .pin-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid rgba(255,255,255,0.6);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.25);
      transition: transform 0.2s;
    }

    .pin.base .pin-dot {
      width: 13px;
      height: 13px;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,0.35);
    }

    .pin:hover .pin-dot {
      transform: scale(1.5);
    }

    /* ── TOOLTIP ── */
    .tooltip {
      position: fixed;
      background: #22252e;
      color: #fff;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 240px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 100;
    }

    .tooltip.visible { opacity: 1; }
    .tooltip .city {
      font-weight: 600;
      font-size: 11px;
      color: #db2b56;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .tooltip .phrase { font-size: 13px; color: #f0f0f0; }

    /* ── DESTRA: FORM ── */
    .form-section h2 {
      font-size: clamp(1.3rem, 3vw, 1.8rem);
      color: var(--dark);
      margin-bottom: 0.5rem;
    }

    .form-section .form-sub {
      font-size: 0.9rem;
      color: #888;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px 14px;
      border: 0.5px solid #ccc;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fff;
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    .contact-form input:focus,
    .contact-form textarea:focus { border-color: #db2b56; }

    .contact-form input::placeholder,
    .contact-form textarea::placeholder { color: #bbb; }

    .btn-submit {
      background: #db2b56;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-start;
      transition: background 0.2s;
      font-family: inherit;
    }

    .btn-submit:hover { background: #b02040; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .contatti-wrap {
        grid-template-columns: 1fr;
        gap: 2.5rem;
        padding: 2rem 1rem 4rem;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">GB</a>
    <button class="nav-toggle" aria-label="Menu">&#9776;</button>
    <ul class="nav-links">
      <li><a href="index.html#about">Chi sono</a></li>
      <li><a href="projects.html">Progetti</a></li>
      <li><a href="quiz.html">Quiz</a></li>
      <li><a href="contatti.html">Contatti</a></li>
      <li><a href="assets/cv.pdf" target="_blank">CV</a></li>
    </ul>
  </nav>

  <div class="contatti-wrap">

    <!-- SINISTRA: MAPPA -->
    <div class="map-section">
      <h2>Di base a Milano. Disponibile ovunque.</h2>
      <p class="map-sub">Freelance non significa stare ferma.<br>Clicca i pin per scoprire dove sono stata — e cosa mi ha lasciato.</p>

      <div class="map-container" id="mapwrap">
        <svg width="0" height="0" style="position:absolute">
          <defs>
            <filter id="duotone" color-interpolation-filters="sRGB">
              <feColorMatrix type="saturate" values="0" result="grey"/>
              <feComponentTransfer result="duotone">
                <feFuncR type="table" tableValues="0.133 0.859"/>
                <feFuncG type="table" tableValues="0.145 0.169"/>
                <feFuncB type="table" tableValues="0.180 0.337"/>
              </feComponentTransfer>
            </filter>
          </defs>
        </svg>
        <img src="images/mappa.jpg" alt="Mappa del mondo" class="map-img" />

        <!-- Milano — base -->
        <div class="pin base" style="left:50%;top:27%;" onclick="showTip(event,'Milano','Quartier generale. Aperitivo imprescindibile. Da qui parte tutto — e qui torno sempre.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Spagna -->
        <div class="pin" style="left:47%;top:30%;" onclick="showTip(event,'Spagna','La lingua la parlo, il ritmo di vita lo invidio. Ho capito che lavorare alle 14 è un crimine contro l\'umanità.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Francia -->
        <div class="pin" style="left:48%;top:25%;" onclick="showTip(event,'Francia','Il paese che mi ha insegnato che il vino non è una bevanda, è una filosofia. Sto ancora studiando.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Gran Bretagna -->
        <div class="pin" style="left:47%;top:21%;" onclick="showTip(event,'Gran Bretagna','Tra il tè delle cinque e i pub, un posto dove rifugiarsi per lavorare quando piove lo trovi sempre. E piove spesso, quindi sono diventata molto produttiva.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Olanda -->
        <div class="pin" style="left:49%;top:22%;" onclick="showTip(event,'Olanda','Canali, bici e brief creativi scritti su una panchina. La città più produttiva in cui abbia mai procrastinato.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Bosnia -->
        <div class="pin" style="left:52%;top:27%;" onclick="showTip(event,'Bosnia','Una città che racconta la storia senza alzare la voce. Ho imparato più sul potere delle parole qui che in qualsiasi corso.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Egitto -->
        <div class="pin" style="left:55%;top:36%;" onclick="showTip(event,'Egitto','Tremila anni di storytelling e io lì a prendere appunti. La narrativa dei Faraoni? Ottimo personal branding.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Giordania -->
        <div class="pin" style="left:57%;top:35%;" onclick="showTip(event,'Giordania','Petra è l\'unico posto che mi ha lasciato senza parole. Per chi vive di parole, capirete che non è una cosa da poco.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Siria -->
        <div class="pin" style="left:57%;top:33%;" onclick="showTip(event,'Siria','L\'anno prima che scoppiasse la guerra, un signore raccontava storie suonando in una lingua che non capivo. Eppure capivo tutto. Lì ho capito cos\'è davvero lo storytelling.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Stati Uniti -->
        <div class="pin" style="left:29%;top:30%;" onclick="showTip(event,'Stati Uniti','Tutto funziona veloce, tutto comunica forte. Ho capito che il mio ritmo è europeo — ma l\'ambizione no.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Malesia -->
        <div class="pin" style="left:73%;top:52%;" onclick="showTip(event,'Malesia','Street food alle 7 di mattina, laptop aperto e deadline rispettate. Il nomadismo digitale nella sua forma più pura.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Filippine -->
        <div class="pin" style="left:78%;top:45%;" onclick="showTip(event,'Filippine','7.000 isole e il wifi peggiore del mondo. Mentre lo cercavo, mi sono dedicata al sub. Non è andata poi così male.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Cina -->
        <div class="pin" style="left:77%;top:30%;" onclick="showTip(event,'Cina','La cucina più onesta del mondo: niente fuffa, solo sapore. Ho preso appunti anche lì — sul cibo e sulla comunicazione.')">
          <div class="pin-dot"></div>
        </div>
        <!-- Nuova Zelanda -->
        <div class="pin" style="left:91%;top:77%;" onclick="showTip(event,'Nuova Zelanda','Bungee jumping e paracadutismo nello stesso viaggio. Ho scoperto che l\'adrenalina e la paura dell\'ignoto creano dipendenza. Anche nel lavoro.')">
          <div class="pin-dot"></div>
        </div>
      </div>
    </div>

    <!-- DESTRA: FORM -->
    <div class="form-section">
      <h2>Scriviamo qualcosa insieme</h2>
      <p class="form-sub">Se sei arrivato fin qui,<br>probabilmente abbiamo qualcosa da dirci.</p>

      <form class="contact-form" action="https://formspree.io/f/TUOCODICE" method="POST">
        <input type="hidden" name="_subject" value="Nuovo contatto — Ginevra Boneschi" />
        <input type="hidden" name="_next" value="grazie.html" />
        <input type="text" name="name" placeholder="Come ti chiami" required />
        <input type="email" name="email" placeholder="La tua email" required />
        <textarea name="message" placeholder="Raccontami del progetto" rows="5" required></textarea>
        <button type="submit" class="btn-submit">Inviami un messaggio →</button>
      </form>
    </div>

  </div>

  <div class="tooltip" id="tip">
    <div class="city" id="tip-city"></div>
    <div class="phrase" id="tip-phrase"></div>
  </div>

  <script>
    function showTip(e, city, phrase) {
      const tip = document.getElementById('tip');
      document.getElementById('tip-city').textContent = city;
      document.getElementById('tip-phrase').textContent = phrase;
      tip.classList.add('visible');
      let x = e.clientX + 14;
      let y = e.clientY - 10;
      if (x + 250 > window.innerWidth) x = e.clientX - 260;
      if (y < 0) y = 10;
      tip.style.left = x + 'px';
      tip.style.top = y + 'px';
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.pin')) {
        document.getElementById('tip').classList.remove('visible');
      }
    });
  </script>

  <script src="js/main.js"></script>
</body>
</html>
